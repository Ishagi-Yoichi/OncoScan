apiVersion: apps/v1
kind: Deployment
metadata:
  name: oncoscan-api
  labels:
    app: oncoscan-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oncoscan-api
  template:
    metadata:
      labels:
        app: oncoscan-api
    spec:
      containers:
        - name: api
          image: oncoscan:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: oncoscan-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
